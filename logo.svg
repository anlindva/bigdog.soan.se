<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" fill="none">
  <!-- Shield outline -->
  <path d="M150 10 L275 60 L275 200 Q275 270 150 320 Q25 270 25 200 L25 60 Z" fill="#C4652E"/>
  <path d="M150 18 L268 65 L268 198 Q268 263 150 312 Q32 263 32 198 L32 65 Z" fill="#2D2926"/>

  <!-- Sun rays -->
  <clipPath id="shield-clip">
    <path d="M150 18 L268 65 L268 198 Q268 263 150 312 Q32 263 32 198 L32 65 Z"/>
  </clipPath>
  <g clip-path="url(#shield-clip)">
    <!-- Sky gradient -->
    <rect x="32" y="18" width="236" height="200" fill="#3A352F"/>

    <!-- Sun rays from behind mountains -->
    <g opacity="0.35">
      <polygon points="150,95 130,18 170,18" fill="#C4652E"/>
      <polygon points="150,95 80,18 110,18" fill="#C4652E"/>
      <polygon points="150,95 190,18 220,18" fill="#C4652E"/>
      <polygon points="150,95 32,30 60,18" fill="#C4652E"/>
      <polygon points="150,95 240,18 268,30" fill="#C4652E"/>
      <polygon points="150,95 32,60 32,90" fill="#C4652E"/>
      <polygon points="150,95 268,60 268,90" fill="#C4652E"/>
    </g>

    <!-- Sun circle -->
    <circle cx="150" cy="100" r="22" fill="#C4652E" opacity="0.6"/>
    <circle cx="150" cy="100" r="16" fill="#F0EBE5" opacity="0.8"/>

    <!-- Mountains background -->
    <path d="M32 200 L80 120 L120 155 L170 90 L220 140 L268 110 L268 200 Z" fill="#1A1714"/>
    <!-- Mountains foreground -->
    <path d="M32 200 L90 140 L130 170 L180 115 L230 160 L268 135 L268 200 Z" fill="#2D2926"/>
    <!-- Snow caps -->
    <path d="M170 90 L158 108 L165 105 L175 95 L185 108 L180 105 Z" fill="#F0EBE5" opacity="0.7"/>
    <path d="M268 110 L255 125 L262 122 L268 115 Z" fill="#F0EBE5" opacity="0.5"/>

    <!-- Trees left -->
    <g fill="#1A1714">
      <polygon points="58,200 65,170 72,200"/>
      <polygon points="58,190 65,162 72,190"/>
      <polygon points="74,200 82,165 90,200"/>
      <polygon points="74,188 82,156 90,188"/>
    </g>

    <!-- Trees right -->
    <g fill="#1A1714">
      <polygon points="218,200 225,172 232,200"/>
      <polygon points="218,192 225,164 232,192"/>
      <polygon points="234,200 242,168 250,200"/>
      <polygon points="234,190 242,160 250,190"/>
    </g>

    <!-- Cabin — based on BigDog blueprint, front elevation -->
    <g transform="translate(18, 0)">
      <!-- LEFT WING — lower, angled roof sloping left -->
      <rect x="70" y="180" width="34" height="20" fill="#F0EBE5"/>
      <path d="M66 180 L104 180 L104 170 Z" fill="#F0EBE5"/>
      <path d="M70 180 L104 180 L104 173 Z" fill="#3A352F"/>
      <!-- Left wing windows -->
      <rect x="76" y="184" width="8" height="10" rx="0.5" fill="#2D2926"/>
      <rect x="89" y="184" width="8" height="10" rx="0.5" fill="#2D2926"/>
      <rect x="77" y="185" width="6" height="8" rx="0.5" fill="#C4652E" opacity="0.2"/>
      <rect x="90" y="185" width="6" height="8" rx="0.5" fill="#C4652E" opacity="0.2"/>

      <!-- MAIN CENTER SECTION — tall steep gable -->
      <rect x="104" y="165" width="56" height="35" fill="#F0EBE5"/>
      <!-- Steep gable roof -->
      <path d="M98 165 L132 125 L166 165 Z" fill="#F0EBE5"/>
      <path d="M102 165 L132 130 L162 165 Z" fill="#3A352F"/>

      <!-- 4 narrow vertical gable windows -->
      <rect x="117" y="140" width="5" height="20" rx="0.5" fill="#2D2926"/>
      <rect x="124" y="137" width="5" height="23" rx="0.5" fill="#2D2926"/>
      <rect x="131" y="137" width="5" height="23" rx="0.5" fill="#2D2926"/>
      <rect x="138" y="140" width="5" height="20" rx="0.5" fill="#2D2926"/>
      <!-- Gable window glow -->
      <rect x="118" y="141" width="3" height="18" rx="0.5" fill="#C4652E" opacity="0.25"/>
      <rect x="125" y="138" width="3" height="21" rx="0.5" fill="#C4652E" opacity="0.25"/>
      <rect x="132" y="138" width="3" height="21" rx="0.5" fill="#C4652E" opacity="0.25"/>
      <rect x="139" y="141" width="3" height="18" rx="0.5" fill="#C4652E" opacity="0.25"/>

      <!-- 4 wider rectangular windows below -->
      <rect x="109" y="170" width="10" height="13" rx="0.5" fill="#2D2926"/>
      <rect x="122" y="170" width="10" height="13" rx="0.5" fill="#2D2926"/>
      <rect x="135" y="170" width="10" height="13" rx="0.5" fill="#2D2926"/>
      <rect x="148" y="170" width="10" height="13" rx="0.5" fill="#2D2926"/>
      <!-- Window glow -->
      <rect x="110" y="171" width="8" height="11" rx="0.5" fill="#C4652E" opacity="0.25"/>
      <rect x="123" y="171" width="8" height="11" rx="0.5" fill="#C4652E" opacity="0.25"/>
      <rect x="136" y="171" width="8" height="11" rx="0.5" fill="#C4652E" opacity="0.25"/>
      <rect x="149" y="171" width="8" height="11" rx="0.5" fill="#C4652E" opacity="0.25"/>

      <!-- Door -->
      <rect x="128" y="188" width="8" height="12" rx="0.5" fill="#2D2926"/>

      <!-- RIGHT WING — lower, angled roof sloping right -->
      <rect x="160" y="180" width="34" height="20" fill="#F0EBE5"/>
      <path d="M160 170 L160 180 L198 180 Z" fill="#F0EBE5"/>
      <path d="M160 173 L160 180 L194 180 Z" fill="#3A352F"/>
      <!-- Right wing windows -->
      <rect x="166" y="184" width="8" height="10" rx="0.5" fill="#2D2926"/>
      <rect x="179" y="184" width="8" height="10" rx="0.5" fill="#2D2926"/>
      <rect x="167" y="185" width="6" height="8" rx="0.5" fill="#C4652E" opacity="0.2"/>
      <rect x="180" y="185" width="6" height="8" rx="0.5" fill="#C4652E" opacity="0.2"/>

      <!-- Chimney -->
      <rect x="148" y="133" width="5" height="16" fill="#F0EBE5"/>
      <rect x="146" y="131" width="9" height="4" rx="0.5" fill="#F0EBE5"/>
      <!-- Smoke -->
      <circle cx="150" cy="126" r="2.5" fill="#8A8279" opacity="0.35"/>
      <circle cx="153" cy="120" r="2" fill="#8A8279" opacity="0.25"/>
      <circle cx="151" cy="115" r="1.5" fill="#8A8279" opacity="0.15"/>

      <!-- Front deck -->
      <rect x="100" y="200" width="68" height="3" fill="#F0EBE5" opacity="0.5"/>
    </g>

    <!-- Ground/snow -->
    <path d="M32 200 L268 200 L268 220 L32 220 Z" fill="#F0EBE5" opacity="0.15"/>
  </g>

  <!-- Banner ribbon -->
  <path d="M18 230 L40 222 L40 258 L18 250 Z" fill="#A8521F"/>
  <path d="M282 230 L260 222 L260 258 L282 250 Z" fill="#A8521F"/>
  <rect x="38" y="222" width="224" height="36" rx="2" fill="#C4652E"/>

  <!-- Banner text -->
  <text x="150" y="248" font-family="'Georgia', serif" font-size="30" font-weight="700" fill="#F0EBE5" text-anchor="middle" letter-spacing="4">BigDog</text>

  <!-- Bottom circle with text -->
  <circle cx="150" cy="282" r="24" fill="#C4652E"/>
  <circle cx="150" cy="282" r="20" fill="#2D2926"/>
  <text x="150" y="289" font-family="'Georgia', serif" font-size="14" font-weight="700" fill="#F0EBE5" text-anchor="middle">IDRE</text>

  <!-- Decorative dots on banner -->
  <circle cx="62" cy="240" r="3" fill="#F0EBE5" opacity="0.4"/>
  <circle cx="238" cy="240" r="3" fill="#F0EBE5" opacity="0.4"/>
</svg>
